name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: install
        run: bun install --frozen-lockfile
      - name: lint
        run: bun run lint
      - name: type-check
        run: bun x tsc --noEmit
      - name: build
        run: bun run build
      - name: test
        run: bun run test
