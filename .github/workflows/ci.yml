name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Lint & Format Check
        run: bun run check

      - name: Type check
        run: bun x tsc --noEmit

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
